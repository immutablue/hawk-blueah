# Packages yaml filename should be in the format of
# packages-custom-&lt;2-numbers&gt;-&lt;description&gt;.yaml 
# - Example: packages-custom-10-my-containers.yaml
# It is **IMPORTANT** to note that these are ran in alphanumeric order.
# (same order that you would get if you did `ls -l ./packages`)
# Meaning, if you are attempting to modify already existing distrobox
# containers for example. Understand the ordering of how they are ran.

# Immutablue section, which applies to **YOUR** build of 
# immutablue
immutablue:
  # Repo URLs to add in the build (they are curled)
  repo_urls:
    all:
    # - name: hyprland.repo
    #   url: https://copr.fedorainfracloud.org/coprs/solopasha/hyprland/repo/fedora-42/solopasha-hyprland-fedora-42.repo
    42: 
    - name: ublue-os-staging.repo
      url: https://copr.fedorainfracloud.org/coprs/ublue-os/staging/repo/fedora-42/ublue-os-staging-fedora-42.repo
    43:
    - name: ublue-os-staging.repo
      url: https://copr.fedorainfracloud.org/coprs/ublue-os/staging/repo/fedora-43/ublue-os-staging-fedora-43.repo
    - name: gnome-x11.repo
      url: https://copr.fedorainfracloud.org/coprs/frantisekz/GNOME-X11/repo/fedora-43/frantisekz-GNOME-X11-fedora-43.repo
    44:
    - name: ublue-os-staging.repo
      url: https://copr.fedorainfracloud.org/coprs/ublue-os/staging/repo/fedora-44/ublue-os-staging-fedora-44.repo
    - name: gnome-x11.repo
      url: https://copr.fedorainfracloud.org/coprs/frantisekz/GNOME-X11/repo/fedora-44/frantisekz-GNOME-X11-fedora-44.repo

  repo_urls_aarch64:
    all:
    - name: rust-epel.repo
      url: https://copr.fedorainfracloud.org/coprs/cyqsimon/el-rust-pkgs/repo/epel-9/cyqsimon-el-rust-pkgs-epel-9.repo

  # RPM packages you want to install
  # Same name as anything you'd normally install with `dnf install &lt;name&gt;`
  rpm:
    all:
    - arm-image-installer
    - binutils
    - borgbackup
    - bpftrace
    - cabal-install
    - cockpit 
    - cockpit-machines
    - cockpit-ostree
    - cockpit-podman 
    - gcc
    # - gcc-plugin-devel  # version conflict with installed gcc
    - gdb
    - gnutls
    - gnutls-utils
    - ImageMagick
    - ImageMagick-devel
    - ltrace
    - lxc
    - lxc-templates
    - perl-JSON
    - perl-Mojolicious 
    - perl-YAML
    - rclone
    - stack
    - strace
    - tlp
    - wireguard-tools
    - s3fs-fuse
    - wofi

  # these can be set for speicific builds too (see /usr/immutablue/build_options)
  rpm_silverblue:
    all:
    - neovim

  # these can be set for speicific builds too (see /usr/immutablue/build_options)
  rpm_gui:
    all:
    - arandr
    - brightnessctl
    - feh
    - gnome-shell-extension-appindicator
    - gnome-shell-extension-blur-my-shell
    - gnome-shell-extension-dash-to-dock
    - gnome-shell-extension-gsconnect
    # - gnome-shell-extension-search-light  # not packaged for fedora 43
    # - gnome-shell-extension-tailscale-gnome-qs  # not packaged for fedora 43
    - gnome-shell-extension-user-theme
    - gtk2-devel
    - i3lock
    - kitty
    - fontconfig-devel
    - freetype-devel
    - libX11-devel
    - libXft-devel
    - libXinerama-devel
    - libXrandr-devel
    - libXScrnSaver-devel
    - mupdf
    - picom
    - qtile-wayland
    - rofi
    - wmctrl
    - xclip
    - xdotool
    - xmobar
    - xmonad
    - xorg-x11-xinit
    - gnome-session
    - gnome-classic-session
    # - gnome-session-xsession  # conflicts with GNOME-X11 repo
    # - gnome-classic-session-xsession
    - xorg-x11-server-Xephyr 
    - xorg-x11-xdm
    - xwininfo
    - zathura
    - zathura-pdf-poppler
    42:
    # - gnome-session-xsession  # conflicts with GNOME-X11 repo

  # You can specify RPMs for specific archs only
  rpm_aarch64:
    all:
  rpm_x86_64:
    all:

  # Urls to RPMs to download (they are curled)
  # so provide the url
  rpm_url:
    all:
  rpm_url_aarch64:
    all:
  rpm_url_x86_64:
    all:

  # RPM packages you want to remove from the image
  rpm_rm:
    all:

  # You can remove 
  rpm_rm_aarch64:
    all:
  rpm_rm_x86_64:
    all:

  # Build files that need to be removed. If the build is filing about some
  # ephemeral file that exists, put the path here so it get removed in 
  # the later build stages
  file_rm:
    all:
    - /etc/yum.repos.d/tailscale.repo
  # - /path/to/some/file
  # - /path/to/some/dir
  # Files can be removed per architecture as well
  file_rm_aarch64:
    all:
  file_rm_x86_64:
    all:


  # Repositories for Flatpaks
  flatpak_repos:
    all:
    - name: flathub
      url: https://dl.flathub.org/repo/flathub.flatpakrepo 

  flatpak_repos_aarch64:
    all:
  flatpak_repos_x86_64:
    all:

  # Runtimes for Flatpaks
  # (Can query with `flatpak list --app --columns=application,runtime`)
  # Really only needed if you plan to build an iso
  flatpaks_runtime:
    all:
  # - org.gnome.Platform/x86_64/46 
  # - org.freedesktop.Platform/x86_64/23.08 
  
  
  # Flatpaks to be installed
  # Check https://flathub.org
  flatpaks:
    all:
    - com.bitwarden.desktop
    - com.calibre_ebook.calibre
    - com.redis.RedisInsight
    - com.usebottles.bottles
    - com.yubico.yubioath
    - org.onlyoffice.desktopeditors
    - org.signal.Signal
    - re.rizin.cutter
    - org.wireshark.Wireshark
    - org.kiwix.desktop
    - org.jamovi.jamovi
    - io.github.peazip.PeaZip
    - com.github.tchx84.Flatseal
    - org.gnome.World.PikaBackup
    - net.waterfox.waterfox
    - net.lutris.Lutris
    - im.riot.Riot
    - it.mijorus.gearlever


  # Architecture specific
  flatpaks_aarch64:
    all:
  flatpaks_x86_64:
    all:

  #Flatpaks to be uninstalled 
  flatpaks_rm:
    all:
  # - org.chromium.Chromium

  # Remove Architecture specific flatpaks
  flatpaks_rm_aarch64:
    all:
  flatpaks_rm_x86_64:
    all:

  # Services 
  # enable
  services_enable_sys:
    all:

  # xrdp requires a gui, so only do it for gui builds
  # (not-nucleus)
  services_enable_sys_gui:
    all:
    - xrdp.service
  # disable services
  services_disable_sys:
    all:
  # mask a service
  services_mask_sys:
    all:
  # unmask the service
  services_unmask_sys:
    all:

  # User services 
  # Handled in immutablue installer
  # enable
  services_enable_user:
    all:
  # disable services
  services_disable_user:
    all:
  # mask a service
  services_mask_user:
    all:
    - localsearch-3.service
    - localsearch-extract-3.service
    - localsearch-writeback-3.service
    - tracker-miner-fs-3.service
    - tracker-miner-fs-control-3.service
    - tracker-miner-rss-3.service
    - tracker-extract-3.service
    - tracker-writeback-3.service
  # unmask the service
  services_unmask_user:
    all:


