# Packages yaml filename should be in the format of
# packages-custom-<2-numbers>-<description>.yaml 
# - Example: packages-custom-10-my-containers.yaml
# It is **IMPORTANT** to note that these are ran in alphanumeric order.
# (same order that you would get if you did `ls -l ./packages`)
# Meaning, if you are attempting to modify already existing distrobox
# containers for example. Understand the ordering of how they are ran.

# Immutablue section, which applies to **YOUR** build of 
# immutablue
immutablue:
  # Repo URLs to add in the build (they are curled)
  repo_urls:
  # - name: tailscale.repo 
  #   url: https://pkgs.tailscale.com/stable/fedora/tailscale.repo
  # We can also set repo_urls per architecture
  repo_urls_aarch64:
  repo_urls_x86_64:

  # RPM packages you want to install
  # Same name as anything you'd normally install with `dnf install <name>`
  rpm:
  - arm-image-installer
  - binutils
  - borgbackup
  - bpftrace
  - cabal-install
  - cockpit 
  - cockpit-machines
  - cockpit-ostree
  - cockpit-podman 
  - gcc
  - gcc-plugin-devel
  - gdb
  - gnutls
  - gnutls-utils
  - ImageMagick
  - ImageMagick-devel
  - ltrace
  - lxc
  - lxc-templates
  - perl-JSON
  - perl-Mojolicious 
  - perl-YAML
  - rclone
  - stack
  - strace
  - tlp
  - wireguard-tools

  # these can be set for speicific builds too (see /usr/immutablue/build_options)
  rpm_silverblue:
  - neovim

  # these can be set for speicific builds too (see /usr/immutablue/build_options)
  rpm_gui:
  - arandr
  - brightnessctl
  - feh
  - gnome-session-xsession
  - gnome-shell-extension-appindicator
  - gnome-shell-extension-blur-my-shell
  - gnome-shell-extension-dash-to-dock
  - gnome-shell-extension-gsconnect
  - gnome-shell-extension-search-light 
  - gnome-shell-extension-tailscale-gnome-qs
  - gnome-shell-extension-user-theme
  - gtk2-devel
  - i3lock
  - kitty
  - libX11-devel 
  - libXft-devel 
  - libXinerama-devel
  - libXrandr-devel
  - libXScrnSaver-devel
  - mupdf
  - picom
  - qtile-wayland
  - rofi
  - wmctrl
  - xclip
  - xdotool
  - xmobar
  - xmonad
  - xorg-x11-server-Xephyr 
  - xorg-x11-xdm
  - xwininfo
  - zathura
  - zathura-pdf-poppler

  # You can specify RPMs for specific archs only
  rpm_aarch64:
  rpm_x86_64:

  # Urls to RPMs to download (they are curled)
  # so provide the url
  rpm_url:
  rpm_url_aarch64:
  rpm_url_x86_64:

  # RPM packages you want to remove from the image
  rpm_rm:

  # You can remove 
  rpm_rm_aarch64:
  rpm_rm_x86_64:

  # Build files that need to be removed. If the build is filing about some
  # ephemeral file that exists, put the path here so it get removed in 
  # the later build stages
  file_rm:
  - /etc/yum.repos.d/tailscale.repo
  # - /path/to/some/file
  # - /path/to/some/dir
  # Files can be removed per architecture as well
  file_rm_aarch64:
  file_rm_x86_64:


  # Repositories for Flatpaks
  flatpak_repos:
    - name: flathub
      url: https://dl.flathub.org/repo/flathub.flatpakrepo 

  flatpak_repos_aarch64:
  flatpak_repos_x86_64:

  # Runtimes for Flatpaks
  # (Can query with `flatpak list --app --columns=application,runtime`)
  # Really only needed if you plan to build an iso
  flatpaks_runtime:
  # - org.gnome.Platform/x86_64/46 
  # - org.freedesktop.Platform/x86_64/23.08 
  
  
  # Flatpaks to be installed
  # Check https://flathub.org
  flatpaks:
    - com.bitwarden.desktop
    - com.calibre_ebook.calibre
    - com.redis.RedisInsight
    - com.usebottles.bottles
    - com.yubico.yubioath
    - org.onlyoffice.desktopeditors
    - org.signal.Signal
    - re.rizin.cutter
    - org.wireshark.Wireshark
    - org.kiwix.desktop
    - org.jamovi.jamovi
    - io.github.peazip.PeaZip
    - com.github.tchx84.Flatseal
    - org.gnome.World.PikaBackup


  # Architecture specific
  flatpaks_aarch64:
  flatpaks_x86_64:

  #Flatpaks to be uninstalled 
  flatpaks_rm:
  # - org.chromium.Chromium

  # Remove Architecture specific flatpaks
  flatpaks_rm_aarch64:
  flatpaks_rm_x86_64:

  # Services 
  # enable
  services_enable_sys:

  # xrdp requires a gui, so only do it for gui builds
  # (not-nucleus)
  services_enable_sys_gui:
  - xrdp.service
  # disable services
  services_disable_sys:
  # mask a service
  services_mask_sys:
  # unmask the service
  services_unmask_sys:

  # User services 
  # Handled in immutablue installer
  # enable
  services_enable_user:
  # disable services
  services_disable_user:
  # mask a service
  services_mask_user:
  # unmask the service
  services_unmask_user:


distrobox:
# Development distrobox for programming and development work
- name: dev
  image: registry.fedoraproject.org/fedora:42
  root: false
  additional_flags:
  pkg_inst_cmd: dnf install -y
  pkg_updt_cmd: dnf update -y
  extra_commands: |
    # Add RPMFusion repositories
    dnf install -y https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm
  packages:
    # Development tools
    - gdb
    - clang
    - ShellCheck
    - gcc
    - gcc-c++
    - make
    - cmake
    - automake
    - autoconf
    - libtool
    # Development libraries
    - gtk4-devel
    - nautilus-devel
    - json-glib-devel
    - libadwaita-devel
    - glib2-devel
    # Fonts
    - fira-code-fonts
    # Debugging and tracing tools
    - bpftool
    - libbpf
    - libbpf-devel
    - bcc-tools
    - strace
    - ltrace
    # Multimedia
    - mpv-devel
    - libsixel
    - ImageMagick
    - ImageMagick-devel
    # Other useful tools
    - pandoc
    - jq
    - yq
    - ripgrep
    - fd-find
    - bat
    - exa
    - neovim
    - tmux
    - git
    - gh
    - nodejs
    - npm
    - python3-pip
    - cargo
    - rustc
  npm_packages:
    - '@anthropic-ai/claude-code'
    - bash-language-server
    - dockerfile-language-server-nodejs
    - pyright
    - intelephense
  pip_packages:
    - tree-sitter
    - autotools-language-server
    - feedparser
    - psycopg
    - python-lsp-server
    - black
    - ruff
    - mypy
    - pytest
    - ipython
    - jupyter
    - pandas
    - numpy
    - matplotlib
  cargo_packages:
    - youtube-tui
    - wthrr
    - sendme
    - bacon
    - cargo-edit
    - cargo-watch
    - rust-analyzer
  bin_export:
    - bash-language-server
    - docker-langserver
    - pyright
    - intelephense
    - autotools-language-server
    - python-lsp-server
    - rust-analyzer
    - shellcheck
    - pandoc
    - youtube-tui
    - wthrr
    - sendme
    - bacon
    - cargo-edit
    - cargo-watch
    - black
    - ruff
    - mypy
    - pytest
    - ipython
    - jupyter
  app_export:
  bin_symlink:
    - podman
    - buildah
    - strace
    - ltrace
    - distrobox

